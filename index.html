<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Indigo Trainings | Certificate Verification</title>

<link rel="icon" href="assets/logo.png">

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<img src="assets/logo.png" class="logo">

<h1>Certificate Verification Portal</h1>

<p>
Verify and Download Your Indigo Trainings Certificate
</p>

</div>

<!-- SEARCH CARD -->

<div class="search-card">

<div class="search-title">

<i class="fa-solid fa-certificate"></i>

Search Certificate

</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Enter Mobile / Certificate ID / Enrolment Number">

<button id="searchBtn">

<i class="fa-solid fa-magnifying-glass"></i>

Search

</button>

</div>

<div id="loader">

<i class="fa-solid fa-spinner fa-spin"></i>

Searching...

</div>

  <!-- STUDENT DETAILS -->

<div class="result-card" id="resultCard">

<div class="result-header">

<i class="fa-solid fa-circle-check"></i>

Certificate Found

</div>

<table class="student-table">

<tr>

<td>Name</td>

<td id="studentName"></td>

</tr>

<tr>

<td>College</td>

<td id="college"></td>

</tr>

<tr>

<td>Branch</td>

<td id="branch"></td>

</tr>

<tr>

<td>Year</td>

<td id="year"></td>

</tr>

<tr>

<td>Enrolment Number</td>

<td id="enrolment"></td>

</tr>

<tr>

<td>Domain</td>

<td id="domain"></td>

</tr>

<tr>

<td>Duration</td>

<td id="duration"></td>

</tr>

<tr>

<td>Grade</td>

<td id="grade"></td>

</tr>

<tr>

<td>Certificate ID</td>

<td id="certificateId"></td>

</tr>

</table>

<div class="button-group">

<button id="previewBtn" class="preview-btn">

<i class="fa-solid fa-eye"></i>

Preview

</button>

<button id="pngBtn" class="png-btn">

<i class="fa-solid fa-image"></i>

PNG

</button>

<button id="pdfBtn" class="pdf-btn">

<i class="fa-solid fa-file-pdf"></i>

PDF

</button>

</div>

</div>

<!-- CERTIFICATE PREVIEW -->

<div class="preview-section" id="previewSection">

<h2>

Certificate Preview

</h2>

<canvas

id="certificateCanvas"

width="1088"

height="1536">

</canvas>

</div>

</div>
